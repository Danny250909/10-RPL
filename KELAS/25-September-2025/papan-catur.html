            display: grid;
            grid-template-columns: repeat(8, 50px);

            width: 400px;
            height: 400px;
        }
        .cell {
            width: 50px;
            height: 50px;
        }
        .black {
            background-color: black;
        }
        .white {
            background-color: white;
        }
        
    </style>
</head>
